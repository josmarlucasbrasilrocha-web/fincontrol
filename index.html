<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FinControl">
<meta name="theme-color" content="#111827">
<title>FinControl v20.7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F4F7FB;--surface:#FFFFFF;--surface2:#F9FAFB;--line:#E2E8F0;
    --text:#0F172A;--muted:#64748B;--soft:#94A3B8;
    --green:#059669;--green-bg:#ECFDF5;--red:#DC2626;--red-bg:#FEF2F2;
    --blue:#2563EB;--blue-bg:#EFF6FF;--violet:#7C3AED;--violet-bg:#F5F3FF;
    --amber:#D97706;--amber-bg:#FFFBEB;--ink:#1E3A5F;--shadow:0 10px 24px rgba(15,23,42,.07);
  }
  [data-theme="dark"] {
    --bg:#111827;--surface:#1F2937;--surface2:#273244;--line:#374151;
    --text:#F9FAFB;--muted:#CBD5E1;--soft:#94A3B8;
    --green-bg:#052E23;--red-bg:#3B0A0A;--blue-bg:#102A56;--violet-bg:#261347;--amber-bg:#392700;
    --shadow:0 12px 34px rgba(0,0,0,.24);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:radial-gradient(circle at top left,rgba(37,99,235,.08),transparent 28%),var(--bg);color:var(--text);font-family:Sora,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  button,input,select,textarea{font:inherit}
  button{cursor:pointer}
  #app{height:100vh;height:100dvh;max-width:520px;margin:0 auto;display:flex;flex-direction:column;background:rgba(244,247,251,.88)}
  .status{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:50;max-width:calc(100vw - 24px);padding:10px 14px;border-radius:8px;border:1px solid var(--line);background:var(--surface);box-shadow:var(--shadow);font-size:13px;font-weight:700;color:var(--text);opacity:0;pointer-events:none;transition:.2s}
  .status.show{opacity:1}
  .status.success{border-color:rgba(5,150,105,.35);color:var(--green);background:var(--green-bg)}
  .status.error{border-color:rgba(220,38,38,.35);color:var(--red);background:var(--red-bg)}
  .status.loading{border-color:rgba(37,99,235,.35);color:var(--blue);background:var(--blue-bg)}
  .topbar{flex:0 0 auto;padding:14px 16px 10px;border-bottom:1px solid var(--line);background:var(--surface);display:flex;align-items:center;justify-content:space-between;gap:12px}
  .eyebrow{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--soft);font-weight:800}
  .title{font-size:20px;font-weight:800;margin-top:2px}
  .actions{display:flex;gap:8px}
  .icon-btn{width:38px;height:38px;border:1px solid var(--line);background:var(--surface2);color:var(--text);border-radius:8px;display:grid;place-items:center;font-size:17px}
  .months{flex:0 0 auto;display:flex;gap:6px;padding:10px 16px;overflow:auto;border-bottom:1px solid var(--line);background:var(--surface);scrollbar-width:none}
  .months::-webkit-scrollbar{display:none}
  .month{border:1px solid var(--line);background:var(--surface2);color:var(--muted);border-radius:8px;padding:7px 11px;font-size:12px;font-weight:800;min-width:44px}
  .month.active{background:var(--blue);border-color:var(--blue);color:#fff}
  .content{flex:1;overflow:auto;padding:14px 14px 18px}
  .nav{flex:0 0 auto;display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--line);background:var(--surface);padding-bottom:env(safe-area-inset-bottom)}
  .nav button{border:0;background:transparent;color:var(--soft);padding:9px 2px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.4px}
  .nav button.active{color:var(--blue)}
  .nav .ico{font-size:18px;line-height:1}
  .dashboard-view{display:block}
  .dashboard-main{display:block}
  .dashboard-side{display:block}
  .desktop-extra{display:block}
  .hero{background:linear-gradient(135deg,var(--ink),#2563EB);color:#fff;border-radius:8px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
  .hero.good{background:#0F766E}
  .hero.warn{background:#92400E}
  .hero.bad{background:#991B1B}
  .hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
  .hero-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:800;color:rgba(255,255,255,.72)}
  .hero-state{font-size:20px;font-weight:900;line-height:1.1;margin-top:5px}
  .hero-value{font-family:"JetBrains Mono",monospace;font-size:28px;font-weight:700;line-height:1.1;margin-top:7px}
  .hero-note{font-size:12px;line-height:1.45;color:rgba(255,255,255,.78);margin-top:8px}
  .hero-pill{border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.1);color:#fff;border-radius:8px;padding:7px 9px;font-size:11px;font-weight:800;white-space:nowrap}
  .hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .hero-mini{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:10px}
  .hero-mini .label{color:rgba(255,255,255,.66)}
  .hero-mini strong{display:block;font-family:"JetBrains Mono",monospace;font-size:15px;margin-top:5px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .card,.kpi,.panel{background:var(--surface);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}
  .kpi{padding:13px}
  .kpi.wide{grid-column:1/-1;display:flex;justify-content:space-between;align-items:flex-end;gap:12px}
  .label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.9px;color:var(--soft)}
  .value{font-family:"JetBrains Mono",monospace;font-size:18px;font-weight:700;margin-top:5px}
  .wide .value{font-size:22px}
  .panel{padding:13px;margin-bottom:12px}
  .panel-title{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .insight{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:12px}
  .insight-mark{width:36px;height:36px;border-radius:8px;display:grid;place-items:center;font-weight:900;flex:0 0 auto}
  .insight strong{display:block;font-size:13px;margin-bottom:2px}
  .alert-list{display:grid;gap:8px}
  .alert-item{display:flex;gap:9px;align-items:flex-start;font-size:13px;line-height:1.35;color:var(--text)}
  .alert-dot{width:9px;height:9px;border-radius:999px;margin-top:4px;flex:0 0 auto;background:var(--green)}
  .alert-item.warn .alert-dot{background:var(--amber)}
  .alert-item.bad .alert-dot{background:var(--red)}
  .period-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .period{background:var(--surface);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);padding:13px}
  .period strong{display:block;font-family:"JetBrains Mono",monospace;font-size:16px;margin-top:6px}
  .card-manager{display:grid;gap:8px;margin-bottom:10px}
  .card-chip{display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid var(--line);background:var(--surface2);border-radius:8px;padding:9px 10px;font-size:13px;font-weight:800}
  .card-chip button{border:0;background:transparent;color:var(--red);font-weight:900;padding:4px}
  .card-hero{display:grid;grid-template-columns:1fr auto;align-items:start;gap:10px}
  .card-total{font-family:"JetBrains Mono",monospace;font-size:22px;font-weight:800;margin-top:4px}
  .setup-list{display:grid;gap:9px}
  .setup-item{display:flex;align-items:flex-start;gap:10px;padding:10px;border:1px solid var(--line);border-radius:8px;background:var(--surface2)}
  .setup-check{width:24px;height:24px;border-radius:999px;display:grid;place-items:center;font-size:12px;font-weight:900;flex:0 0 auto}
  .setup-item.done .setup-check{background:var(--green-bg);color:var(--green)}
  .setup-item.todo .setup-check{background:var(--amber-bg);color:var(--amber)}
  .setup-item strong{display:block;font-size:13px;margin-bottom:2px}
  details.advanced{border:1px solid var(--line);border-radius:8px;background:var(--surface);padding:0;margin-bottom:12px;overflow:hidden}
  details.advanced summary{list-style:none;padding:13px;font-weight:900;color:var(--muted);cursor:pointer}
  details.advanced summary::-webkit-details-marker{display:none}
  details.advanced .advanced-body{border-top:1px solid var(--line);padding:13px}
  .quick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .quick button,.primary,.secondary,.danger{border:1px solid transparent;border-radius:8px;padding:13px 12px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:7px}
  .primary{width:100%;background:var(--blue);color:#fff}
  .secondary{background:var(--surface2);border-color:var(--line);color:var(--text)}
  .danger{background:var(--red-bg);border-color:rgba(220,38,38,.25);color:var(--red)}
  .green{background:var(--green-bg);color:var(--green);border-color:rgba(5,150,105,.25)!important}
  .red{background:var(--red-bg);color:var(--red);border-color:rgba(220,38,38,.25)!important}
  .violet{background:var(--violet-bg);color:var(--violet);border-color:rgba(124,58,237,.25)!important}
  .blue{background:var(--blue-bg);color:var(--blue);border-color:rgba(37,99,235,.25)!important}
  .amber{background:var(--amber-bg);color:var(--amber);border-color:rgba(217,119,6,.25)!important}
  .bar{height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-top:8px}
  .bar span{display:block;height:100%;border-radius:99px;background:var(--green)}
  .list{background:var(--surface);border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:12px}
  .item{display:flex;align-items:center;gap:11px;padding:12px;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:0}
  .bubble{width:36px;height:36px;border-radius:8px;display:grid;place-items:center;flex:0 0 auto;font-weight:900}
  .info{min-width:0;flex:1}
  .desc{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .meta{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.35}
  .amount{font-family:"JetBrains Mono",monospace;font-size:14px;font-weight:800;text-align:right;white-space:nowrap}
  .row-actions{display:flex;gap:6px;margin-left:2px}
  .mini{width:32px;height:32px;border:1px solid var(--line);border-radius:8px;background:var(--surface2);color:var(--muted);font-weight:800}
  .empty{padding:30px 18px;text-align:center;color:var(--muted);line-height:1.5;font-size:14px}
  .filters{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:10px}
  .chips{display:flex;gap:6px;overflow:auto;margin-bottom:10px;scrollbar-width:none}
  .chip{border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:8px;padding:8px 10px;font-size:12px;font-weight:800;white-space:nowrap}
  .chip.active{background:var(--blue-bg);border-color:rgba(37,99,235,.28);color:var(--blue)}
  .form{display:grid;gap:11px}
  .field label{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--soft);margin-bottom:6px}
  .input,.select,.textarea{width:100%;border:1px solid var(--line);background:var(--surface2);color:var(--text);border-radius:8px;padding:12px;outline:none}
  .textarea{min-height:84px;resize:vertical}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-layer{position:fixed;inset:0;background:rgba(17,24,39,.62);z-index:40;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.2s}
  .modal-layer.open{opacity:1;pointer-events:auto}
  .modal{width:100%;max-width:520px;max-height:92vh;overflow:auto;background:var(--surface);border-radius:8px 8px 0 0;padding:16px 16px calc(16px + env(safe-area-inset-bottom));border:1px solid var(--line);box-shadow:var(--shadow);transform:translateY(100%);transition:.24s}
  .modal-layer.open .modal{transform:translateY(0)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
  .modal-title{font-size:18px;font-weight:900}
  .close{width:36px;height:36px;border:1px solid var(--line);background:var(--surface2);border-radius:8px}
  .spinner{width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
  .fab{position:fixed;left:50%;bottom:calc(58px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:35;border:0;border-radius:999px;background:var(--blue);color:#fff;box-shadow:0 14px 30px rgba(37,99,235,.34);padding:13px 18px;font-weight:900;display:flex;align-items:center;gap:8px}
  .action-grid{display:grid;grid-template-columns:1fr;gap:10px}
  .action-grid button{justify-content:flex-start;text-align:left}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (min-width:860px){
    #app{max-width:1180px;border-left:1px solid var(--line);border-right:1px solid var(--line)}
    .content{padding:20px}
    .dashboard-view{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(320px,.85fr);gap:16px;align-items:start}
    .hero{padding:20px}
    .hero-value{font-size:34px}
    .cards-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .cards-grid .panel{margin-bottom:0}
  }
  @media (max-width:520px){
    .topbar{padding:10px 12px 8px}
    .months{padding:7px 12px}
    .content{padding:10px 10px 12px}
    .hero{padding:12px;margin-bottom:8px}
    .hero-top{margin-bottom:9px}
    .hero-state{font-size:17px}
    .hero-value{font-size:23px}
    .hero-note{font-size:11px;margin-top:5px}
    .hero-mini{padding:8px}
    .quick,.period-grid{gap:8px;margin-bottom:8px}
    .quick button,.primary,.secondary,.danger{padding:10px}
    .panel{padding:10px;margin-bottom:8px}
    .desktop-extra{display:none}
    .mobile-tight{margin-bottom:8px}
  }
  @media (max-width:360px){.content{padding:8px}.value{font-size:16px}.wide .value{font-size:19px}.quick{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}.amount{font-size:12px}}
</style>
</head>
<body>
<div id="app">
  <div class="status" id="status"></div>
  <header class="topbar">
    <div>
      <div class="eyebrow" id="versionLabel">FinControl v20.7</div>
      <div class="title" id="title">Dashboard</div>
    </div>
    <div class="actions">
      <button class="icon-btn" id="syncBtn" title="Sincronizar" onclick="syncData()">⟳</button>
      <button class="icon-btn" id="themeBtn" title="Tema" onclick="toggleTheme()">◐</button>
    </div>
  </header>
  <div class="months" id="months"></div>
  <main class="content" id="content"></main>
  <nav class="nav" id="nav">
    <button class="active" data-tab="dashboard" onclick="navigate('dashboard')"><span class="ico">◉</span>Início</button>
    <button data-tab="historico" onclick="navigate('historico')"><span class="ico">☰</span>Histórico</button>
    <button data-tab="cartoes" onclick="navigate('cartoes')"><span class="ico">▣</span>Cartões</button>
    <button data-tab="mais" onclick="navigate('mais')"><span class="ico">⚙</span>Mais</button>
  </nav>
  <button class="fab" onclick="openActionChooser()">＋ Lançar</button>
</div>
<div class="modal-layer" id="modalLayer" onclick="closeModalOutside(event)">
  <section class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle"></div>
      <button class="close" onclick="closeModal()">×</button>
    </div>
    <div id="modalBody"></div>
  </section>
</div>
<script>
const APP_VERSION = "20.7";
const APP_BUILD_DATE = "2026-05-04";
const DEFAULT_SHEET_URL = "https://script.google.com/macros/s/AKfycbynox1ikZHr_EGINHTzsQ67ErfcHokQCOd7xoWr9Sl0FhrWlZAif-Qv3dEsgJWQ_DoyiQ/exec";
const APP_STORAGE_VERSION = "20.7";
const MESES = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const DEFAULT_CONFIG = {
  appVersion: APP_VERSION,
  anoAtivo: new Date().getFullYear(),
  categoriasReceita: ["Salário","Freelance","Investimentos","Aluguel Recebido","Bônus","Outros"],
  categoriasDespesa: ["Moradia","Alimentação","Transporte","Saúde","Educação","Lazer","Vestuário","Assinaturas","Pet","Presentes","Outros"],
  cartoesAtivos: [],
  cartoesDetalhes: [],
  tokenInstalacao: ""
};
const titles = { dashboard:"Dashboard", historico:"Histórico", cartoes:"Cartões", mais:"Mais" };
const store = {
  get(key, fallback) { try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; } },
  set(key, value) { localStorage.setItem(key, JSON.stringify(value)); },
  del(key) { localStorage.removeItem(key); }
};
const previousDefaultUrl = localStorage.getItem("defaultSheetUrl");
const savedSheetUrl = localStorage.getItem("sheetUrl");
const savedStorageVersion = localStorage.getItem("appStorageVersion");
if ((previousDefaultUrl && previousDefaultUrl !== DEFAULT_SHEET_URL && (!savedSheetUrl || savedSheetUrl === previousDefaultUrl)) || savedStorageVersion !== APP_STORAGE_VERSION) {
  ["lancamentos","gastosCartao","cartoesResumo","config"].forEach(key => store.del(key));
  localStorage.setItem("sheetUrl", DEFAULT_SHEET_URL);
}
localStorage.setItem("defaultSheetUrl", DEFAULT_SHEET_URL);
localStorage.setItem("appStorageVersion", APP_STORAGE_VERSION);
let state = {
  tab: "dashboard",
  mes: MESES[new Date().getMonth()],
  theme: localStorage.getItem("theme") || "light",
  lancamentos: store.get("lancamentos", []),
  gastosCartao: store.get("gastosCartao", []),
  config: { ...DEFAULT_CONFIG, ...store.get("config", {}) },
  settings: { sheetUrl: localStorage.getItem("sheetUrl") || DEFAULT_SHEET_URL, token: localStorage.getItem("installToken") || "" },
  lastSync: localStorage.getItem("lastSync") || "",
  remoteVersion: localStorage.getItem("remoteVersion") || "",
  remoteBuildDate: localStorage.getItem("remoteBuildDate") || "",
  remoteSheetVersion: localStorage.getItem("remoteSheetVersion") || "",
  cartoesResumo: store.get("cartoesResumo", []),
  historyFilter: "todos",
  query: "",
  syncing: false
};
let modalMode = null;
let editing = null;

const fmt = value => new Intl.NumberFormat("pt-BR", { style:"currency", currency:"BRL" }).format(Number(value) || 0);
const today = () => new Date().toISOString().slice(0, 10);
const uid = prefix => `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
const esc = value => String(value ?? "").replace(/[&<>"']/g, ch => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[ch]));
function moneyNumber(value) {
  const text = String(value ?? "0").trim();
  if (!text) return 0;
  if (text.includes(",") && text.includes(".")) return Number(text.replace(/\./g, "").replace(",", ".")) || 0;
  if (text.includes(",")) return Number(text.replace(",", ".")) || 0;
  return Number(text) || 0;
}
const monthFromDate = value => MESES[(new Date((value || today()) + "T12:00:00")).getMonth()];
const yearFromDate = value => (new Date((value || today()) + "T12:00:00")).getFullYear();

function persist() {
  store.set("lancamentos", state.lancamentos);
  store.set("gastosCartao", state.gastosCartao);
  store.set("config", state.config);
  store.set("cartoesResumo", state.cartoesResumo);
}
function showStatus(message, type = "success", duration = 2400) {
  const el = document.getElementById("status");
  el.textContent = message;
  el.className = `status show ${type}`;
  clearTimeout(showStatus.timer);
  showStatus.timer = setTimeout(() => el.className = "status", duration);
}
function applyTheme() {
  document.documentElement.dataset.theme = state.theme === "dark" ? "dark" : "";
  document.getElementById("themeBtn").textContent = state.theme === "dark" ? "☀" : "◐";
}
function toggleTheme() {
  state.theme = state.theme === "dark" ? "light" : "dark";
  localStorage.setItem("theme", state.theme);
  applyTheme();
}

function renderMonths() {
  const el = document.getElementById("months");
  el.innerHTML = MESES.map(m => `<button class="month ${m === state.mes ? "active" : ""}" onclick="selectMes('${m}')">${m}</button>`).join("");
  setTimeout(() => el.querySelector(".active")?.scrollIntoView({ inline:"center", behavior:"smooth" }), 50);
}
function selectMes(mes) {
  state.mes = mes;
  renderMonths();
  renderContent();
}
function navigate(tab) {
  state.tab = tab;
  document.querySelectorAll("#nav button").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === tab));
  document.getElementById("title").textContent = titles[tab];
  renderContent();
}
function renderContent() {
  const views = { dashboard: renderDashboardV2, historico: renderHistorico, cartoes: renderCartoesV2, mais: renderMais };
  document.getElementById("content").innerHTML = views[state.tab]();
}

function lancMes(mes = state.mes) {
  return state.lancamentos.filter(item => item.mes === mes && recordYear(item) === Number(state.config.anoAtivo));
}
function totalsForMonth(mes = state.mes) {
  const list = lancMes(mes);
  const receitas = list.filter(l => l.tipo === "receita").reduce((s, l) => s + Number(l.valor || 0), 0);

function normalizeCard(name) {
  return String(name || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();

function normalizeCardDetail(card) {

  return {
    nome: String(card?.nome || card?.name || card?.cartao || "").trim(),
    limite: Math.max(Number(card?.limite || card?.limit || 0), 0),
    fechamento: normalizeDay(card?.fechamento || card?.diaFechamento || card?.closingDay),
    vencimento: normalizeDay(card?.vencimento || card?.diaVencimento || card?.dueDay)
  };
}
function normalizeDay(value) {

}
function cardDetailsList() {
  const details = Array.isArray(state.config.cartoesDetalhes) ? state.config.cartoesDetalhes : [];
  const source = details.length ? details : (state.config.cartoesAtivos || []);
  const seen = new Set();
  return source
    .map(normalizeCardDetail)
    .filter(card => {
      const key = normalizeCard(card.nome);
      if (!key || seen.has(key)) return false;
      seen.add(key);
      return true;
    });
}
function cardNames() {
  return cardDetailsList().map(card => card.nome);
}
function findCardDetail(name) {
  const wanted = normalizeCard(name);
  return cardDetailsList().find(card => normalizeCard(card.nome) === wanted) || null;
}
function updateCardsConfig(details) {
  const normalized = (details || []).map(normalizeCardDetail).filter(card => card.nome);
  state.config.cartoesDetalhes = normalized;
  state.config.cartoesAtivos = normalized.map(card => card.nome);
}
function cardInvoiceForMonth(card) {
  const detail = typeof card === "object" ? normalizeCardDetail(card) : (findCardDetail(card) || normalizeCardDetail(card));
  const targetMonth = MESES.indexOf(state.mes);
  const targetYear = Number(state.config.anoAtivo);
  return state.gastosCartao
    .filter(item => normalizeCard(item.cartao) === normalizeCard(detail.nome))
    .reduce((sum, item) => {
      const purchase = new Date(String(item.data || today()) + "T12:00:00");
      if (isNaN(purchase.getTime())) return sum;
      const parcelas = Math.max(Number(item.parcelas) || 1, 1);
      const fechamento = detail.fechamento || 0;
      let firstMonth = purchase.getMonth();
      let firstYear = purchase.getFullYear();
      if (fechamento > 0 && purchase.getDate() > fechamento) {
        firstMonth = (firstMonth + 1) % 12;
        if (firstMonth === 0) firstYear++;
      }
      const value = Number(item.valor || 0) / parcelas;
      for (let p = 0; p < parcelas; p++) {
        const month = (firstMonth + p) % 12;
        const year = firstYear + Math.floor((firstMonth + p) / 12);
        if (month === targetMonth && year === targetYear) return sum + value;
      }
      return sum;
    }, 0);
}

function cardMetrics(name) {
  const detail = typeof name === "object" ? normalizeCardDetail(name) : (findCardDetail(name) || normalizeCardDetail(name));
  const cardName = detail.nome;
  const resumo = state.cartoesResumo.find(c => normalizeCard(c.nome) === normalizeCard(cardName)) || {};
  const gastos = state.gastosCartao.filter(g => normalizeCard(g.cartao) === normalizeCard(cardName));
  const limite = Number(resumo.limite || detail.limite || 0);
  const fatura = cardInvoiceForMonth(detail);
  const limiteUtilizado = Number(resumo.limiteUtilizado || cardLimitUsed(detail));
  const disponivel = limite ? Number(resumo.disponivel || (limite - limiteUtilizado)) : 0;
  const usado = limite ? Math.min(100, Math.round(limiteUtilizado / limite * 100)) : 0;
  const vencimento = Number(resumo.vencimento || detail.vencimento || 0);
  const fechamento = Number(resumo.fechamento || detail.fechamento || 0);
  const dias = vencimento ? daysUntilDue(vencimento) : null;
  return { resumo, detail, gastos, limite, limiteUtilizado, fatura, disponivel, usado, vencimento, fechamento, dias };
}

async function apiRequest(action, payload = {}) {
  const url = (state.settings.sheetUrl || "").trim();
  if (!url) return { status:"local", message:"URL não configurada." };
  const body = { action, token: state.settings.token || "", ...payload };
  if (["insert","update","delete"].includes(action)) return writeRequest(url, body);
  try {
    const res = await fetch(url, { method:"POST", headers:{ "Content-Type":"text/plain;charset=utf-8" }, body: JSON.stringify(body) });
    const json = await res.json();
    return json;
  } catch (err) {
    if (["insert","update","delete"].includes(action)) {
      try {
        const params = new URLSearchParams();
        Object.entries(body).forEach(([key, value]) => params.set(key, typeof value === "object" ? JSON.stringify(value) : value));
        await fetch(`${url}?${params.toString()}`, { method:"GET", mode:"no-cors" });
        return { status:"ok", fallback:true };
      } catch (fallbackErr) {
        return { status:"error", message:String(fallbackErr) };
      }
    }
    return { status:"error", message:String(err) };
  }
}
async function writeRequest(url, body) {
  const params = new URLSearchParams();
  Object.entries(body).forEach(([key, value]) => params.set(key, typeof value === "object" ? JSON.stringify(value) : value));
  try {
    await fetch(`${url}?${params.toString()}`, { method:"GET", mode:"no-cors" });
    return { status:"ok", transport:"get-no-cors" };
  } catch (err) {
    try {
      const res = await fetch(url, { method:"POST", headers:{ "Content-Type":"text/plain;charset=utf-8" }, body: JSON.stringify(body) });
      return await res.json();
    } catch (postErr) {
      return { status:"error", message:String(postErr) };
    }
  }
}
async function syncData(silent = false) {
  if (state.syncing) return;
  state.syncing = true;
  document.getElementById("syncBtn").innerHTML = '<span class="spinner"></span>';
  if (!silent) showStatus("Sincronizando...", "loading", 7000);
  const json = await apiRequest("getAll");
  state.syncing = false;
  document.getElementById("syncBtn").textContent = "⟳";
  if (json.status !== "ok") return showStatus(json.message || "Não foi possível sincronizar.", "error", 4200);
  state.config = { ...state.config, ...json.config };
  updateCardsConfig(cardDetailsList());
  state.lancamentos = (json.lancamentos || []).map(normalizeItem);
  state.gastosCartao = (json.gastosCartao || []).map(normalizeItem);
  state.cartoesResumo = json.cartoesResumo || [];
  state.remoteVersion = json.scriptVersion || json.version || state.config.scriptVersion || state.config.appVersion || "";
  state.remoteBuildDate = json.buildDate || state.config.appBuildDate || "";
  state.remoteSheetVersion = json.sheetSchemaVersion || state.config.sheetSchemaVersion || "";
  state.lastSync = new Date().toLocaleString("pt-BR", { dateStyle:"short", timeStyle:"short" });
  localStorage.setItem("remoteVersion", state.remoteVersion);
  localStorage.setItem("remoteBuildDate", state.remoteBuildDate);
  localStorage.setItem("remoteSheetVersion", state.remoteSheetVersion);
  localStorage.setItem("lastSync", state.lastSync);
  persist();
  renderMonths();
  renderContent();
  if (!silent) showStatus("Dados sincronizados.", "success");
}
function mergeById(local, remote) {
  const map = new Map();
  [...local, ...remote].forEach(item => item.id && map.set(item.id, item));
  return [...map.values()].sort((a, b) => String(b.data || "").localeCompare(String(a.data || "")));
}
function normalizeItem(item) {
  return { ...item, valor:Number(item.valor || 0), data:String(item.data || ""), mes:item.mes || monthFromDate(item.data) };
}

function addCardFromConfig() {
  captureConfigDraft();
  const original = document.getElementById("edit-card-original")?.value || "";
  const name = (document.getElementById("new-card-name")?.value || "").trim();
  const limite = moneyNumber(document.getElementById("new-card-limit")?.value || "0");
  const fechamento = normalizeDay(document.getElementById("new-card-fechamento")?.value);
  const vencimento = normalizeDay(document.getElementById("new-card-vencimento")?.value);
  if (!name) return showStatus("Informe o nome do cartão.", "error", 2400);
  if (!fechamento || !vencimento) return showStatus("Informe fechamento e vencimento entre 1 e 31.", "error", 2800);
  const details = cardDetailsList();
  const duplicate = details.some(card => normalizeCard(card.nome) === normalizeCard(name) && normalizeCard(card.nome) !== normalizeCard(original));
  if (duplicate) return showStatus("Cartão já está cadastrado.", "error", 2400);
  const next = details.filter(card => normalizeCard(card.nome) !== normalizeCard(original || name));
  next.push({ nome: name, limite, fechamento, vencimento });
  updateCardsConfig(next);
  persist();
  renderContent();
  showStatus("Cartão salvo. Clique em Salvar e sincronizar para gravar na planilha.", "success", 2600);
}

}
function clearCardForm() {
  ["edit-card-original","new-card-name","new-card-limit","new-card-fechamento","new-card-vencimento"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = "";
  });
}
function removeCardFromConfig(encodedName) {
  captureConfigDraft();
  const name = decodeCardArg(encodedName);
  if (!confirm(`Remover ${name} dos cartões ativos? Os lançamentos já gravados não serão apagados.`)) return;
  updateCardsConfig(cardDetailsList().filter(card => normalizeCard(card.nome) !== normalizeCard(name)));
  persist();
  renderContent();
}
async function saveRemoteConfig() {
  if (document.getElementById("cfg-url")) saveLocalSettings();
  captureConfigDraft();
  const cards = cardDetailsList();
  const config = {
    anoAtivo: Number(document.getElementById("cfg-year").value) || new Date().getFullYear(),
    categoriasReceita: splitTextarea("cfg-rec"),
    categoriasDespesa: splitTextarea("cfg-desp"),
    cartoesAtivos: cards.map(card => card.nome),
    cartoesDetalhes: cards,
    tokenInstalacao: state.settings.token
  };
  state.config = { ...state.config, ...config };
  persist();
  renderContent();
  const result = await apiRequest("saveConfig", { config });
  if (result.status === "ok") {
    await syncData(true);
    showStatus("Configuração salva e sincronizada.", "success", 2600);
  } else {
    showStatus("Configuração salva localmente.", "error", 3600);
  }
}

async function runDiagnostics() {
  showStatus("Verificando planilha...", "loading", 6000);
  const result = await apiRequest("diagnostics");
  if (result.status !== "ok") return showStatus(result.message || "Diagnóstico falhou.", "error", 4200);
  showTechnicalReport("Diagnóstico da planilha", result.diagnostics);
  showStatus("Diagnóstico concluído.", "success", 2200);
}

async function runMigration() {
  if (!confirm("Atualizar a estrutura técnica da planilha agora? O ID da planilha e a URL do app serão mantidos.")) return;
  showStatus("Atualizando estrutura...", "loading", 9000);
  const result = await apiRequest("migrate");
  if (result.status !== "ok") return showStatus(result.message || "Migração falhou.", "error", 5200);
  await syncData(true);
  showTechnicalReport("Atualização da estrutura", {
    mensagem: result.message,
    alteracoes: result.changes || [],
    diagnostico: result.diagnostics || {}
  });
  showStatus(result.message || "Estrutura atualizada.", "success", 3200);
}

function showTechnicalReport(title, data) {
  const lines = [];
  if (data) {
    if (data.sheetId) lines.push(["Planilha", data.sheetId]);
    if (data.appVersion || data.scriptVersion || data.sheetSchemaVersion) lines.push(["Versões", `App ${data.appVersion || "-"} · Script ${data.scriptVersion || "-"} · Planilha ${data.sheetSchemaVersion || "-"}`]);
    if (data.migrationVersion) lines.push(["Migração", data.migrationVersion]);
    if (typeof data.sheetsCount !== "undefined") lines.push(["Abas", data.sheetsCount]);
    if (data.transactionCounts) lines.push(["Movimentos", `Receitas ${data.transactionCounts.receitas || 0} · Despesas ${data.transactionCounts.despesas || 0} · Cartão ${data.transactionCounts.gastosCartao || 0}`]);
    if (data.missingIds) lines.push(["IDs pendentes", `Receitas ${data.missingIds.receitas || 0} · Despesas ${data.missingIds.despesas || 0} · Cartão ${data.missingIds.gastosCartao || 0}`]);
    if (data.formulaErrors) lines.push(["Erros de fórmula", data.formulaErrors.total || 0]);
    if (data.missingSheets && data.missingSheets.length) lines.push(["Abas ausentes", data.missingSheets.join(", ")]);
    if (data.mensagem) lines.push(["Resultado", data.mensagem]);
  }
  const changes = data && data.alteracoes && data.alteracoes.length
    ? `<div class="panel blue" style="box-shadow:none;margin-top:10px"><div class="panel-title">Alterações</div>${data.alteracoes.map(item => `<div class="meta">${esc(item)}</div>`).join("")}</div>`
    : "";
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalBody").innerHTML = `<div class="list">
    ${lines.map(([key, value]) => `<div class="item"><div class="info"><div class="desc">${esc(key)}</div><div class="meta">${esc(value)}</div></div></div>`).join("") || empty("Sem detalhes retornados.")}
  </div>${changes}`;
  document.getElementById("modalLayer").classList.add("open");
}

function splitTextarea(id) {
  return document.getElementById(id).value.split(",").map(v => v.trim()).filter(Boolean);
}
function clearCache() {
  if (!confirm("Limpar dados locais deste aparelho?")) return;
  ["lancamentos","gastosCartao","cartoesResumo","config"].forEach(key => store.del(key));
  ["lastSync","remoteVersion","remoteBuildDate","remoteSheetVersion"].forEach(key => localStorage.removeItem(key));
  state.lancamentos = [];
  state.gastosCartao = [];
  state.cartoesResumo = [];
  state.config = { ...DEFAULT_CONFIG };
  state.lastSync = "";
  state.remoteVersion = "";
  state.remoteBuildDate = "";
  state.remoteSheetVersion = "";
  persist();
  renderContent();
  showStatus("Cache local limpo.");
}
function exportLocalData() {
  const blob = new Blob([JSON.stringify({ lancamentos:state.lancamentos, gastosCartao:state.gastosCartao, config:state.config }, null, 2)], { type:"application/json" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `fincontrol-backup-${today()}.json`;
  link.click();
  URL.revokeObjectURL(link.href);
}
function empty(text) {
  return `<div class="empty">${esc(text)}</div>`;
}

async function init() {
  applyTheme();
  renderMonths();
  renderContent();
  if (state.settings.sheetUrl) await syncData();
}
init();
</script>
</body>
</html>
