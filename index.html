<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FinControl">
<meta name="theme-color" content="#0F172A">
<title>FinControl – Josmar Brasil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  /* ── VARIABLES ─────────────────────────────────── */
  :root {
    --bg:        #0F172A;
    --bg2:       #1E293B;
    --bg3:       #334155;
    --border:    #1E293B;
    --text:      #F1F5F9;
    --text2:     #94A3B8;
    --text3:     #475569;
    --green:     #10B981;
    --green-bg:  #052E16;
    --red:       #F87171;
    --red-bg:    #2D0A0A;
    --blue:      #60A5FA;
    --blue-bg:   #0D1F3C;
    --purple:    #A78BFA;
    --purple-bg: #1A0D3D;
    --amber:     #FBBF24;
    --card-r:    16px;
    --transition: .22s cubic-bezier(.4,0,.2,1);
  }
  [data-theme="light"] {
    --bg:        #F8FAFC;
    --bg2:       #FFFFFF;
    --bg3:       #E2E8F0;
    --border:    #E2E8F0;
    --text:      #0F172A;
    --text2:     #475569;
    --text3:     #94A3B8;
    --green-bg:  #ECFDF5;
    --red-bg:    #FEF2F2;
    --blue-bg:   #EFF6FF;
    --purple-bg: #F5F3FF;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%; overflow: hidden;
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
  }

  /* ── LAYOUT ──────────────────────────────────── */
  #app {
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    max-width: 480px; margin: 0 auto;
    position: relative; overflow: hidden;
  }

  /* ── HEADER ──────────────────────────────────── */
  .header {
    flex-shrink: 0;
    padding: 14px 20px 10px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    position: relative; z-index: 10;
  }
  .header-left { display: flex; flex-direction: column; }
  .header-label {
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text3);
  }
  .header-title {
    font-size: 18px; font-weight: 800; color: var(--text);
    margin-top: 1px;
  }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--bg2);
    color: var(--text2); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
  }
  .icon-btn:active { transform: scale(.92); }

  /* ── MONTH STRIP ─────────────────────────────── */
  .month-strip {
    flex-shrink: 0;
    display: flex; gap: 6px;
    padding: 10px 20px;
    overflow-x: auto; scrollbar-width: none;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .month-strip::-webkit-scrollbar { display: none; }
  .month-pill {
    padding: 5px 14px; border-radius: 20px; border: none;
    font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 600;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    background: var(--bg2); color: var(--text3);
    transition: var(--transition);
  }
  .month-pill.active {
    background: var(--blue); color: #fff;
    box-shadow: 0 2px 12px rgba(96,165,250,.35);
  }

  /* ── SCROLL CONTENT ──────────────────────────── */
  .content {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 16px 16px 20px;
    scrollbar-width: none;
  }
  .content::-webkit-scrollbar { display: none; }

  /* ── BOTTOM NAV ──────────────────────────────── */
  .bottom-nav {
    flex-shrink: 0;
    display: flex;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 10px 0 8px; cursor: pointer; border: none;
    background: transparent; color: var(--text3);
    font-family: 'Sora', sans-serif; font-size: 9px; font-weight: 700;
    letter-spacing: .8px; text-transform: uppercase;
    gap: 4px; transition: var(--transition);
  }
  .nav-item.active { color: var(--blue); }
  .nav-icon { font-size: 20px; line-height: 1; }

  /* ── CARDS ───────────────────────────────────── */
  .card {
    background: var(--bg2);
    border-radius: var(--card-r);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 12px;
  }
  .card-header {
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .card-title {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text2);
  }
  .card-body { padding: 14px 16px; }

  /* ── KPI GRID ────────────────────────────────── */
  .kpi-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 12px;
  }
  .kpi {
    background: var(--bg2); border-radius: var(--card-r);
    border: 1px solid var(--border);
    padding: 14px 16px;
    transition: var(--transition);
  }
  .kpi.wide { grid-column: span 2; display: flex; justify-content: space-between; align-items: center; }
  .kpi-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text3); margin-bottom: 6px;
  }
  .kpi.wide .kpi-label { margin-bottom: 0; }
  .kpi-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 600;
  }
  .kpi.wide .kpi-value { font-size: 22px; }

  /* ── PROGRESS BAR ────────────────────────────── */
  .progress-wrap { margin-bottom: 12px; }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text2); font-weight: 600;
    margin-bottom: 6px;
  }
  .progress-track {
    height: 7px; background: var(--bg3); border-radius: 99px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 99px;
    transition: width .6s cubic-bezier(.4,0,.2,1);
  }

  /* ── CATEGORY BARS ───────────────────────────── */
  .cat-item { margin-bottom: 12px; }
  .cat-item:last-child { margin-bottom: 0; }
  .cat-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 5px;
  }
  .cat-name { font-size: 13px; color: var(--text); font-weight: 600; }
  .cat-val { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--red); font-weight: 600; }
  .cat-bar { height: 5px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
  .cat-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--blue), var(--purple)); transition: width .5s ease; }

  /* ── TRANSACTION LIST ────────────────────────── */
  .tx-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .tx-item:last-child { border-bottom: none; padding-bottom: 0; }
  .tx-icon {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .tx-info { flex: 1; min-width: 0; }
  .tx-desc { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .tx-amount { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; flex-shrink: 0; }

  /* ── BUTTONS ─────────────────────────────────── */
  .btn-row { display: flex; gap: 10px; margin-bottom: 14px; }
  .btn {
    flex: 1; padding: 14px 10px; border-radius: 14px; border: none;
    font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: var(--transition); display: flex;
    align-items: center; justify-content: center; gap: 6px;
  }
  .btn:active { transform: scale(.96); }
  .btn-green  { background: var(--green-bg); color: var(--green); border: 1.5px solid var(--green); }
  .btn-red    { background: var(--red-bg);   color: var(--red);   border: 1.5px solid var(--red); }
  .btn-purple { background: var(--purple-bg);color: var(--purple);border: 1.5px solid var(--purple); }
  .btn-primary {
    width: 100%; padding: 16px; border-radius: 14px; border: none;
    font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: var(--transition); margin-top: 8px;
    color: #fff;
  }
  .btn-primary:active { transform: scale(.97); }
  .btn-primary.green  { background: linear-gradient(135deg,#059669,#10B981); }
  .btn-primary.red    { background: linear-gradient(135deg,#DC2626,#EF4444); }
  .btn-primary.purple { background: linear-gradient(135deg,#7C3AED,#A78BFA); }

  /* ── FORM ────────────────────────────────────── */
  .form-group { margin-bottom: 12px; }
  .form-label {
    display: block; font-size: 11px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text2); margin-bottom: 6px;
  }
  .form-input, .form-select {
    width: 100%; padding: 13px 16px; border-radius: 12px;
    border: 1.5px solid var(--border); background: var(--bg);
    color: var(--text); font-family: 'Sora', sans-serif; font-size: 15px;
    outline: none; transition: var(--transition);
    -webkit-appearance: none; appearance: none;
  }
  .form-input:focus, .form-select:focus { border-color: var(--blue); }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }
  .parcela-preview {
    text-align: center; padding: 12px;
    background: var(--blue-bg); border-radius: 12px;
    color: var(--blue); font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 600; margin-top: -4px; margin-bottom: 12px;
    border: 1px solid rgba(96,165,250,.2);
  }

  /* ── MODAL ───────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100; backdrop-filter: blur(6px);
    opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg2); border-radius: 24px 24px 0 0;
    width: 100%; max-width: 480px;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
    border: 1px solid var(--border); border-bottom: none;
    max-height: 92vh; overflow-y: auto;
    transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle {
    width: 40px; height: 4px; background: var(--bg3);
    border-radius: 99px; margin: 0 auto 18px;
  }
  .modal-title {
    font-size: 18px; font-weight: 800; margin-bottom: 20px;
  }

  /* ── STATUS BADGE ────────────────────────────── */
  .status-bar {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    padding: 10px 20px; border-radius: 12px; font-size: 13px; font-weight: 600;
    z-index: 200; white-space: nowrap; opacity: 0; pointer-events: none;
    transition: opacity .3s; box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }
  .status-bar.show { opacity: 1; }
  .status-bar.success { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
  .status-bar.error   { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red); }
  .status-bar.loading { background: var(--blue-bg);  color: var(--blue);  border: 1px solid var(--blue); }

  /* ── EMPTY STATE ─────────────────────────────── */
  .empty {
    text-align: center; padding: 40px 20px; color: var(--text3);
    font-size: 14px; line-height: 1.6;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* ── SECTION TITLE ───────────────────────────── */
  .section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text3);
    margin: 16px 0 8px; padding: 0 2px;
  }

  /* ── CARD GROUP ──────────────────────────────── */
  .card-group-header {
    padding: 12px 16px;
    background: linear-gradient(90deg, var(--purple-bg), var(--bg2));
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .card-group-name { font-size: 14px; font-weight: 700; color: var(--purple); }
  .card-group-total { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; color: var(--text); }

  /* ── SPINNER ─────────────────────────────────── */
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--bg3);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin .8s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SCROLLBAR ───────────────────────────────── */
  * { scrollbar-width: thin; scrollbar-color: var(--bg3) transparent; }
</style>
</head>
<body>
<div id="app">

  <!-- STATUS BAR -->
  <div class="status-bar" id="statusBar"></div>

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <span class="header-label">Controle Financeiro</span>
      <span class="header-title" id="headerTitle">Dashboard</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="syncBtn" title="Sincronizar" onclick="syncData()">⟳</button>
      <button class="icon-btn" id="themeBtn" title="Alternar tema" onclick="toggleTheme()">◐</button>
    </div>
  </div>

  <!-- MONTH STRIP -->
  <div class="month-strip" id="monthStrip"></div>

  <!-- CONTENT -->
  <div class="content" id="content"></div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-dashboard" onclick="navigate('dashboard')">
      <span class="nav-icon">◉</span>Dashboard
    </button>
    <button class="nav-item" id="nav-lancar" onclick="navigate('lancar')">
      <span class="nav-icon">＋</span>Lançar
    </button>
    <button class="nav-item" id="nav-historico" onclick="navigate('historico')">
      <span class="nav-icon">☰</span>Histórico
    </button>
    <button class="nav-item" id="nav-cartoes" onclick="navigate('cartoes')">
      <span class="nav-icon">▣</span>Cartões
    </button>
  </nav>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG — substitua pela sua URL do Google Apps Script
// ═══════════════════════════════════════════════════════════════
const SHEET_URL = "https://script.google.com/macros/s/AKfycbwUk3hyF28FAFWlK2uZKXFnlmuq7cSlONzURWdb-_VgAgylO1iYPMWnfWHu1qe1jFky8w/exec";

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
const MESES = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const CATS_DESPESA  = ["Moradia","Alimentação","Transporte","Saúde","Educação","Lazer","Vestuário","Assinaturas","Pet","Presentes","Outros"];
const CATS_RECEITA  = ["Salário","Freelance","Investimentos","Aluguel Recebido","Bônus","Outros"];
const CARTOES = Array.from({length:10},(_,i)=>`Cartão ${i+1}`);

let state = {
  tab: "dashboard",
  mes: MESES[new Date().getMonth()],
  theme: localStorage.getItem("theme") || "dark",
  lancamentos: JSON.parse(localStorage.getItem("lancamentos")||"[]"),
  gastosCartao: JSON.parse(localStorage.getItem("gastosCartao")||"[]"),
  syncing: false,
};

// ─── SEED demo data if empty ──────────────────────────────────
if (!state.lancamentos.length) {
  state.lancamentos = [
    {id:1,tipo:"receita",cat:"Salário",desc:"Salário Janeiro",valor:5500,data:"2025-01-01",mes:"Jan"},
    {id:2,tipo:"despesa",cat:"Alimentação",desc:"Supermercado",valor:320,data:"2025-01-08",mes:"Jan"},
    {id:3,tipo:"despesa",cat:"Transporte",desc:"Combustível",valor:180,data:"2025-01-10",mes:"Jan"},
    {id:4,tipo:"receita",cat:"Freelance",desc:"Projeto Web",valor:1200,data:"2025-01-20",mes:"Jan"},
    {id:5,tipo:"despesa",cat:"Lazer",desc:"Restaurante",valor:95,data:"2025-01-22",mes:"Jan"},
    {id:6,tipo:"receita",cat:"Salário",desc:"Salário Fevereiro",valor:5500,data:"2025-02-01",mes:"Fev"},
    {id:7,tipo:"despesa",cat:"Saúde",desc:"Consulta médica",valor:250,data:"2025-02-05",mes:"Fev"},
    {id:8,tipo:"despesa",cat:"Alimentação",desc:"Mercado",valor:410,data:"2025-02-12",mes:"Fev"},
  ];
  state.gastosCartao = [
    {id:1,cartao:"Cartão 1",desc:"iFood",cat:"Alimentação",valor:58.90,parcelas:1,data:"2025-01-05"},
    {id:2,cartao:"Cartão 1",desc:"Amazon – Fone BT",cat:"Lazer",valor:299,parcelas:3,data:"2025-01-15"},
    {id:3,cartao:"Cartão 2",desc:"Farmácia",cat:"Saúde",valor:87.30,parcelas:1,data:"2025-02-03"},
    {id:4,cartao:"Cartão 2",desc:"Curso Online",cat:"Educação",valor:390,parcelas:6,data:"2025-02-10"},
  ];
  persist();
}

// ═══════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════
const fmt = v => new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v||0);
const today = () => new Date().toISOString().split("T")[0];
const uid = () => Date.now() + Math.random().toString(36).slice(2);

function persist() {
  localStorage.setItem("lancamentos",  JSON.stringify(state.lancamentos));
  localStorage.setItem("gastosCartao", JSON.stringify(state.gastosCartao));
}

function showStatus(msg, type="success", dur=2500) {
  const el = document.getElementById("statusBar");
  el.textContent = msg;
  el.className = `status-bar show ${type}`;
  setTimeout(() => el.className = "status-bar", dur);
}

// ═══════════════════════════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════════════════════════
function toggleTheme() {
  state.theme = state.theme === "dark" ? "light" : "dark";
  applyTheme();
  localStorage.setItem("theme", state.theme);
}
function applyTheme() {
  document.documentElement.setAttribute("data-theme",
    state.theme === "light" ? "light" : "");
  document.getElementById("themeBtn").textContent = state.theme === "dark" ? "☀" : "◐";
}
applyTheme();

// ═══════════════════════════════════════════════════════════════
// MONTH STRIP
// ═══════════════════════════════════════════════════════════════
function renderMonthStrip() {
  const strip = document.getElementById("monthStrip");
  strip.innerHTML = MESES.map(m => `
    <button class="month-pill ${m===state.mes?"active":""}"
      onclick="selectMes('${m}')">${m}</button>
  `).join("");
  // scroll active into view
  setTimeout(() => {
    const active = strip.querySelector(".active");
    if (active) active.scrollIntoView({inline:"center",behavior:"smooth"});
  }, 50);
}

function selectMes(m) {
  state.mes = m;
  renderMonthStrip();
  renderContent();
}

// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════
const titles = {dashboard:"Dashboard",lancar:"Lançar",historico:"Histórico",cartoes:"Cartões"};

function navigate(tab) {
  state.tab = tab;
  document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
  document.getElementById(`nav-${tab}`).classList.add("active");
  document.getElementById("headerTitle").textContent = titles[tab];
  renderContent();
}

// ═══════════════════════════════════════════════════════════════
// RENDER ROUTER
// ═══════════════════════════════════════════════════════════════
function renderContent() {
  const el = document.getElementById("content");
  if      (state.tab === "dashboard")  el.innerHTML = renderDashboard();
  else if (state.tab === "lancar")     el.innerHTML = renderLancar();
  else if (state.tab === "historico")  el.innerHTML = renderHistorico();
  else if (state.tab === "cartoes")    el.innerHTML = renderCartoes();
}

// ═══════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════
function renderDashboard() {
  const mes = state.mes;
  const lancMes = state.lancamentos.filter(l => l.mes === mes);
  const receitas  = lancMes.filter(l=>l.tipo==="receita").reduce((s,l)=>s+l.valor,0);
  const despesas  = lancMes.filter(l=>l.tipo==="despesa").reduce((s,l)=>s+l.valor,0);
  const saldo     = receitas - despesas;
  const pct       = receitas > 0 ? Math.min(100, Math.round((despesas/receitas)*100)) : 0;
  const cartaoMes = state.gastosCartao
    .filter(g => MESES[new Date(g.data+"T12:00:00").getMonth()] === mes)
    .reduce((s,g)=>s+g.valor,0);

  const catBreakdown = CATS_DESPESA.map(cat => ({
    cat, val: lancMes.filter(l=>l.tipo==="despesa"&&l.cat===cat).reduce((s,l)=>s+l.valor,0)
  })).filter(c=>c.val>0).sort((a,b)=>b.val-a.val);
  const maxCat = Math.max(...catBreakdown.map(c=>c.val), 1);

  const recentes = [...state.lancamentos]
    .sort((a,b)=>b.data.localeCompare(a.data)).slice(0,5);

  const saldoColor = saldo >= 0 ? "var(--blue)" : "var(--red)";
  const barColor = pct > 85
    ? "linear-gradient(90deg,var(--red),#F87171)"
    : "linear-gradient(90deg,var(--green),#34D399)";

  return `
    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi" style="border-color:rgba(16,185,129,.2);background:var(--green-bg)">
        <div class="kpi-label">Receitas</div>
        <div class="kpi-value" style="color:var(--green)">${fmt(receitas)}</div>
      </div>
      <div class="kpi" style="border-color:rgba(248,113,113,.2);background:var(--red-bg)">
        <div class="kpi-label">Despesas</div>
        <div class="kpi-value" style="color:var(--red)">${fmt(despesas)}</div>
      </div>
      <div class="kpi wide" style="border-color:rgba(96,165,250,.2);background:var(--blue-bg)">
        <div><div class="kpi-label">Saldo ${mes}</div><div class="kpi-value" style="color:${saldoColor}">${fmt(saldo)}</div></div>
        <div style="text-align:right"><div class="kpi-label">Cartão</div><div class="kpi-value" style="color:var(--purple)">${fmt(cartaoMes)}</div></div>
      </div>
    </div>

    <!-- Progress -->
    ${receitas > 0 ? `
    <div class="card progress-wrap" style="padding:14px 16px;margin-bottom:12px">
      <div class="progress-label">
        <span>Comprometido da receita</span>
        <span style="color:${pct>85?"var(--red)":"var(--green)"}">${pct}%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%;background:${barColor}"></div>
      </div>
    </div>` : ""}

    <!-- Cat breakdown -->
    ${catBreakdown.length ? `
    <div class="card">
      <div class="card-header"><span class="card-title">Top categorias</span></div>
      <div class="card-body">
        ${catBreakdown.slice(0,5).map(c=>`
          <div class="cat-item">
            <div class="cat-row">
              <span class="cat-name">${c.cat}</span>
              <span class="cat-val">${fmt(c.val)}</span>
            </div>
            <div class="cat-bar">
              <div class="cat-fill" style="width:${Math.round((c.val/maxCat)*100)}%"></div>
            </div>
          </div>
        `).join("")}
      </div>
    </div>` : ""}

    <!-- Recentes -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Últimos lançamentos</span>
        <span style="font-size:11px;color:var(--blue);cursor:pointer;font-weight:600"
          onclick="navigate('historico')">Ver todos →</span>
      </div>
      <div class="card-body" style="padding-top:0;padding-bottom:0">
        ${recentes.length ? recentes.map(l=>`
          <div class="tx-item">
            <div class="tx-icon" style="background:${l.tipo==="receita"?"var(--green-bg)":"var(--red-bg)"}">
              ${l.tipo==="receita"?"↑":"↓"}
            </div>
            <div class="tx-info">
              <div class="tx-desc">${l.desc}</div>
              <div class="tx-meta">${l.cat} · ${l.mes} · ${l.data}</div>
            </div>
            <div class="tx-amount" style="color:${l.tipo==="receita"?"var(--green)":"var(--red)"}">
              ${l.tipo==="receita"?"+":"-"}${fmt(l.valor)}
            </div>
          </div>
        `).join("") : `<div class="empty"><div class="empty-icon">📭</div>Nenhum lançamento ainda</div>`}
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════
// LANÇAR
// ═══════════════════════════════════════════════════════════════
function renderLancar() {
  return `
    <div class="btn-row">
      <button class="btn btn-green" onclick="openModal('receita')">↑ Receita</button>
      <button class="btn btn-red"   onclick="openModal('despesa')">↓ Despesa</button>
    </div>
    <button class="btn btn-purple" style="width:100%;margin-bottom:14px" onclick="openModal('cartao')">
      ▣ Gasto no Cartão
    </button>

    <div class="section-title">Lançamentos de ${state.mes} / ${new Date().getFullYear()}</div>
    <div class="card">
      <div class="card-body" style="padding-top:0;padding-bottom:0">
        ${renderTxList(state.lancamentos.filter(l=>l.mes===state.mes))}
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════
// HISTÓRICO
// ═══════════════════════════════════════════════════════════════
function renderHistorico() {
  const todos = [...state.lancamentos].sort((a,b)=>b.data.localeCompare(a.data));
  if (!todos.length) return `<div class="empty"><div class="empty-icon">📭</div>Nenhum lançamento registrado.<br>Use a aba Lançar para começar.</div>`;

  // Group by month+year
  const byMes = {};
  todos.forEach(l => {
    const ano = l.data ? new Date(l.data + "T12:00:00").getFullYear() : new Date().getFullYear();
    const key = `${l.mes} / ${ano}`;
    if(!byMes[key]) byMes[key]=[];
    byMes[key].push(l);
  });

  return Object.entries(byMes).map(([mesAno, items]) => {
    const rec = items.filter(i=>i.tipo==="receita").reduce((s,i)=>s+i.valor,0);
    const des = items.filter(i=>i.tipo==="despesa").reduce((s,i)=>s+i.valor,0);
    return `
      <div class="section-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>${mesAno}</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:${rec-des>=0?"var(--green)":"var(--red)"}">
          ${fmt(rec-des)}
        </span>
      </div>
      <div class="card">
        <div class="card-body" style="padding-top:0;padding-bottom:0">
          ${renderTxList(items)}
        </div>
      </div>
    `;
  }).join("");
}

function renderTxList(items) {
  if (!items.length) return `<div class="empty" style="padding:24px"><div class="empty-icon">📭</div>Nenhum lançamento neste mês</div>`;
  return items.map(l=>`
    <div class="tx-item">
      <div class="tx-icon" style="background:${l.tipo==="receita"?"var(--green-bg)":"var(--red-bg)"}">
        ${l.tipo==="receita"?"↑":"↓"}
      </div>
      <div class="tx-info">
        <div class="tx-desc">${l.desc}</div>
        <div class="tx-meta">${l.cat} · ${l.data}</div>
      </div>
      <div class="tx-amount" style="color:${l.tipo==="receita"?"var(--green)":"var(--red)"}">
        ${l.tipo==="receita"?"+":"-"}${fmt(l.valor)}
      </div>
    </div>
  `).join("");
}

// ═══════════════════════════════════════════════════════════════
// CARTÕES
// ═══════════════════════════════════════════════════════════════
function renderCartoes() {
  const cartoesUsados = CARTOES.filter(c => state.gastosCartao.some(g=>g.cartao===c));
  const totalGeral = state.gastosCartao.reduce((s,g)=>s+g.valor,0);

  return `
    <button class="btn btn-purple" style="width:100%;margin-bottom:14px" onclick="openModal('cartao')">
      ▣ Novo Gasto no Cartão
    </button>

    ${cartoesUsados.length === 0 ? `
      <div class="empty"><div class="empty-icon">💳</div>Nenhum gasto de cartão registrado.</div>
    ` : `
      <div class="kpi wide" style="margin-bottom:12px;background:var(--purple-bg);border-color:rgba(167,139,250,.2)">
        <div><div class="kpi-label">Total em Cartões</div></div>
        <div class="kpi-value" style="color:var(--purple)">${fmt(totalGeral)}</div>
      </div>

      ${cartoesUsados.map(cartao => {
        const gastos = state.gastosCartao.filter(g=>g.cartao===cartao);
        const total  = gastos.reduce((s,g)=>s+g.valor,0);
        return `
          <div class="card" style="margin-bottom:12px">
            <div class="card-group-header">
              <span class="card-group-name">▣ ${cartao}</span>
              <span class="card-group-total">${fmt(total)}</span>
            </div>
            ${gastos.map((g,i,arr)=>`
              <div style="padding:12px 16px;display:flex;justify-content:space-between;
                align-items:center;${i<arr.length-1?"border-bottom:1px solid var(--border)":""}">
                <div>
                  <div style="font-size:13px;font-weight:600;color:var(--text)">${g.desc}</div>
                  <div style="font-size:11px;color:var(--text3);margin-top:2px">
                    ${g.cat} · ${g.parcelas}x · ${g.data}
                  </div>
                </div>
                <div style="text-align:right">
                  <div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--purple)">${fmt(g.valor)}</div>
                  ${g.parcelas>1?`<div style="font-size:11px;color:var(--text3)">${fmt(g.valor/g.parcelas)}/mês</div>`:""}
                </div>
              </div>
            `).join("")}
          </div>
        `;
      }).join("")}
    `}
  `;
}

// ═══════════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════════
let currentModal = null;

function openModal(type) {
  currentModal = type;
  const overlay = document.getElementById("modalOverlay");
  const title   = document.getElementById("modalTitle");
  const body    = document.getElementById("modalBody");

  const colors = {receita:"var(--green)",despesa:"var(--red)",cartao:"var(--purple)"};
  const labels = {receita:"↑ Nova Receita",despesa:"↓ Nova Despesa",cartao:"▣ Gasto no Cartão"};
  const btnClass = {receita:"green",despesa:"red",cartao:"purple"};

  title.style.color = colors[type];
  title.textContent  = labels[type];
  body.innerHTML = buildForm(type, btnClass[type]);

  overlay.classList.add("open");
  setTimeout(() => body.querySelector("input,select")?.focus(), 350);
}

function buildForm(type, btnClass) {
  const mesOptions = MESES.map(m=>`<option value="${m}" ${m===state.mes?"selected":""}>${m}</option>`).join("");
  const catOptions = (type==="receita" ? CATS_RECEITA : CATS_DESPESA)
    .map(c=>`<option value="${c}">${c}</option>`).join("");
  const cartaoOptions = CARTOES.map(c=>`<option value="${c}">${c}</option>`).join("");

  if (type === "cartao") return `
    <div class="form-group">
      <label class="form-label">Cartão</label>
      <select class="form-select" id="f-cartao"><option value="">Selecione...</option>${cartaoOptions}</select>
    </div>
    <div class="form-group">
      <label class="form-label">Descrição</label>
      <input class="form-input" id="f-desc" placeholder="Ex: iFood, Amazon, Posto Shell...">
    </div>
    <div class="form-group">
      <label class="form-label">Categoria</label>
      <select class="form-select" id="f-cat"><option value="">Selecione...</option>${catOptions}</select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Valor Total (R$)</label>
        <input class="form-input" id="f-valor" type="number" placeholder="0,00" inputmode="decimal"
          oninput="updateParcela()">
      </div>
      <div class="form-group">
        <label class="form-label">Parcelas</label>
        <input class="form-input" id="f-parcelas" type="number" value="1" min="1" max="48"
          oninput="updateParcela()">
      </div>
    </div>
    <div class="parcela-preview" id="parcelaPreview">1x sem juros</div>
    <div class="form-group">
      <label class="form-label">Data</label>
      <input class="form-input" id="f-data" type="date" value="${today()}">
    </div>
    <button class="btn-primary ${btnClass}" onclick="salvar()">Registrar Gasto</button>
  `;

  return `
    <div class="form-group">
      <label class="form-label">Descrição</label>
      <input class="form-input" id="f-desc" placeholder="${type==="receita"?"Ex: Salário, Freelance...":"Ex: Supermercado, Farmácia..."}">
    </div>
    <div class="form-group">
      <label class="form-label">Categoria</label>
      <select class="form-select" id="f-cat"><option value="">Selecione...</option>${catOptions}</select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Valor (R$)</label>
        <input class="form-input" id="f-valor" type="number" placeholder="0,00" inputmode="decimal">
      </div>
      <div class="form-group">
        <label class="form-label">Mês</label>
        <select class="form-select" id="f-mes">${mesOptions}</select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Data</label>
      <input class="form-input" id="f-data" type="date" value="${today()}">
    </div>
    <button class="btn-primary ${btnClass}" onclick="salvar()">
      ${type==="receita"?"Lançar Receita":"Lançar Despesa"}
    </button>
  `;
}

function updateParcela() {
  const valor    = parseFloat(document.getElementById("f-valor")?.value||0);
  const parcelas = parseInt(document.getElementById("f-parcelas")?.value||1);
  const el = document.getElementById("parcelaPreview");
  if (!el) return;
  if (valor && parcelas > 0) {
    el.textContent = parcelas === 1
      ? `${fmt(valor)} à vista`
      : `${parcelas}x de ${fmt(valor/parcelas)} sem juros`;
  } else {
    el.textContent = "1x sem juros";
  }
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
  currentModal = null;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById("modalOverlay")) closeModal();
}

function salvar() {
  const desc    = document.getElementById("f-desc")?.value.trim();
  const cat     = document.getElementById("f-cat")?.value;
  const valor   = parseFloat(document.getElementById("f-valor")?.value);
  const data    = document.getElementById("f-data")?.value;
  const mes     = document.getElementById("f-mes")?.value || MESES[new Date(data+"T12:00:00").getMonth()];
  const cartao  = document.getElementById("f-cartao")?.value;
  const parcelas= parseInt(document.getElementById("f-parcelas")?.value||1);

  if (!desc || !valor || isNaN(valor)) return showStatus("⚠ Preencha descrição e valor","error");

  if (currentModal === "cartao") {
    if (!cartao) return showStatus("⚠ Selecione o cartão","error");
    const novo = {id:uid(),cartao,desc,cat:cat||"Outros",valor,parcelas,data};
    state.gastosCartao.unshift(novo);
    sendToSheet("cartao", novo);
  } else {
    if (!cat) return showStatus("⚠ Selecione a categoria","error");
    const novo = {id:uid(),tipo:currentModal,cat,desc,valor,data,mes};
    state.lancamentos.unshift(novo);
    sendToSheet("lancamento", novo);
  }

  persist();
  closeModal();
  showStatus("✅ Salvo com sucesso!");
  renderContent();
}

// ═══════════════════════════════════════════════════════════════
// GOOGLE SHEETS INTEGRATION
// ═══════════════════════════════════════════════════════════════
async function sendToSheet(type, data) {
  if (!SHEET_URL) return;
  try {
    // Remove internal id before sending to Sheets
    const { id, ...cleanData } = data;
    const params = new URLSearchParams({
      action: "insert",
      type: type,
      data: JSON.stringify(cleanData)
    });
    await fetch(`${SHEET_URL}?${params.toString()}`, { method: "GET", mode: "no-cors" });
  } catch(e) { console.warn("Sheets offline:", e); }
}

async function syncData() {
  if (!SHEET_URL) {
    showStatus("Configure a URL do Google Sheets primeiro","error",3500);
    return;
  }
  if (state.syncing) return;
  state.syncing = true;
  document.getElementById("syncBtn").innerHTML = '<div class="spinner"></div>';
  showStatus("⟳ Sincronizando...","loading",5000);

  try {
    const res  = await fetch(`${SHEET_URL}?action=getAll`);
    const json = await res.json();
    if (json.lancamentos) state.lancamentos = json.lancamentos;
    if (json.gastosCartao) state.gastosCartao = json.gastosCartao;
    persist();
    renderContent();
    showStatus("✅ Dados sincronizados!");
  } catch(e) {
    showStatus("❌ Erro ao sincronizar","error");
  } finally {
    state.syncing = false;
    document.getElementById("syncBtn").textContent = "⟳";
  }
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
renderMonthStrip();
renderContent();
</script>
